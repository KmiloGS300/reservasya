<ion-content [fullscreen]="true">

  <div class="container">

    <div class="card">

      <h1 class="title">Reservas</h1>

      <div class="reservation-card" *ngFor="let reservation of reservations">
        
        <h2>{{ reservation.customerName }}</h2>

        <p>{{ reservation.date }} - {{ reservation.time }}</p>

        <p>Personas: {{ reservation.people }}</p>

        <p>Tel: {{ reservation.phone }}</p>

      </div>

    </div>

  </div>

</ion-content>
