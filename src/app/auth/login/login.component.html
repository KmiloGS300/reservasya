<ion-content [fullscreen]="true">

  <div class="login-container">

    <div class="login-card">

      <!-- Título -->
      <h1 class="title">Reservas<span>Ya</span></h1>
      <p class="subtitle">Inicia sesión para continuar</p>

      <!-- Email -->
      <ion-item lines="none" class="input-item">
        <ion-input 
          type="email" 
          placeholder="Correo electrónico"
          [(ngModel)]="email">
        </ion-input>
      </ion-item>

      <!-- Password -->
      <ion-item lines="none" class="input-item">
        <ion-input 
          type="password" 
          placeholder="Contraseña"
          [(ngModel)]="password">
        </ion-input>
      </ion-item>

      <!-- Botón -->
      <ion-button expand="block" class="btn-login" (click)="login()">
        Ingresar
      </ion-button>

      <!-- Registro -->
      <p class="register-text">
        ¿ No tienes cuenta ?
        <span class="register-link" (click)="irRegistro()">
          Créala
        </span>
      </p>

    </div>

  </div>

</ion-content>
